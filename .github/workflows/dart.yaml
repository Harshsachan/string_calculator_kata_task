name: Dart CI

on:
    push:
    pull_request:
    workflow_dispatch:

concurrency:
    group: dart-ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: dart-lang/setup-dart@v1
              with:
                  sdk: stable

            - name: Cache pub
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.pub-cache
                      .dart_tool
                  key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-pub-

            - name: Install dependencies
              run: dart pub get

            - name: Format (fail on diff)
              run: dart format .

            - name: Analyze (fatal infos/warnings)
              run: dart analyze --fatal-infos --fatal-warnings

            - name: Test (with coverage)
              run: |
                  dart pub global activate coverage
                  dart test --reporter expanded --coverage=coverage
                  ~/.pub-cache/bin/format_coverage \
                    --lcov \
                    --in=coverage \
                    --out=coverage/lcov.info \
                    --packages=.dart_tool/package_config.json \
                    --report-on=lib

            - name: Enforce coverage >= 0%
              run: dart run tool/coverage_check.dart --lcov coverage/lcov.info --min 0

            - name: Upload coverage artifact
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-lcov
                  path: coverage/lcov.info
                  if-no-files-found: error
                  retention-days: 7
